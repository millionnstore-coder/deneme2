<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Millionn Studio Gallery - AI Generated Masterpieces.">
    <title>Galeri | Millionn Studio</title>
    
    <link rel="icon" type="image/png" href="assets/img/icons.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2878368346405896" crossorigin="anonymous"></script>

    <style>
        /* --- TEMEL AYARLAR --- */
        :root {
            --neon-green: #39ff14;
            --bg-dark: #050505;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark); color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh; width: 100%;
            overflow-x: hidden; overflow-y: auto; 
        }
        
        body::-webkit-scrollbar { width: 6px; }
        body::-webkit-scrollbar-track { background: #050505; }
        body::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        /* --- BACKGROUND NOISE --- */
        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0;
        }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; 
            padding: 30px 6%; 
            display: flex; justify-content: flex-start; align-items: center;
            gap: 60px; 
            z-index: 200; box-sizing: border-box;
            background: rgba(5,5,5,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .brand-logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; color: #fff; text-decoration: none; margin-right: auto; }
        .brand-logo span { color: #fff; } /* Nokta rengi Beyaz yapıldı */

        .nav-links { display: flex; gap: 30px; margin-right: 40px; }
        .nav-link { 
            text-decoration: none; color: #888; cursor: pointer;
            font-family: 'Space Mono', monospace; font-size: 12px; 
            text-transform: uppercase; transition: 0.3s; position: relative; 
        }
        .nav-link:hover { color: var(--neon-green); text-shadow: 0 0 10px rgba(57, 255, 20, 0.4); }

        .back-btn {
            display: inline-flex; align-items: center; gap: 10px;
            text-decoration: none; color: #fff;
            font-family: 'Space Mono', monospace; font-size: 12px;
            background-color: transparent; 
            border: 1px solid rgba(255,255,255,0.4); 
            border-radius: 50px; padding: 10px 24px; 
            transition: all 0.3s ease;
        }
        .back-btn svg { width: 14px; height: 14px; fill: currentColor; transition: transform 0.3s; }
        .back-btn:hover { border-color: var(--neon-green); color: var(--neon-green); background: rgba(57, 255, 20, 0.1); }
        .back-btn:hover svg { transform: translateX(-4px); }

        .hamburger { display: none; flex-direction: column; gap: 6px; cursor: pointer; margin-left: auto; z-index: 201; }
        .bar { width: 30px; height: 2px; background-color: #fff; transition: 0.4s; }

        /* --- MOBİL MENÜ --- */
        .mobile-menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #050505;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 40px;
            transform: translateY(-100%); transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1); z-index: 150;
        }
        .mobile-menu-overlay.active { transform: translateY(0); }
        .mobile-link { 
            font-family: 'Inter', sans-serif; font-weight: 900; font-size: 32px; cursor: pointer;
            color: #fff; text-decoration: none; text-transform: uppercase; 
            opacity: 0; transform: translateY(20px); transition: 0.4s; 
        }
        .mobile-link:hover { color: var(--neon-green); }
        .mobile-menu-overlay.active .mobile-link { opacity: 1; transform: translateY(0); }

        /* --- STUDIO GRID SİSTEMİ --- */
        .studio-container { padding: 140px 6% 100px 6%; position: relative; z-index: 10; }
        
        .page-header { margin-bottom: 50px; }
        .page-title { font-size: 40px; font-weight: 900; letter-spacing: -1px; color: #fff; text-transform: uppercase; }
        .highlight { color: var(--neon-green); }

        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 25px; 
        }

        .project-card { 
            display: flex; flex-direction: column; gap: 15px; 
            cursor: pointer; position: relative; transition: 0.3s;
        }

        .image-box {
            position: relative; width: 100%; aspect-ratio: 4 / 5; 
            border-radius: 6px; overflow: hidden;
            background: #0a0a0a; border: 1px solid #222; 
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .image-box img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .project-card:hover img { transform: scale(1.08); }
        .project-card:hover .image-box { 
            border-color: var(--neon-green); 
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); 
        }

        .card-meta { display: flex; flex-direction: column; gap: 5px; padding: 0 5px; }
        .project-title { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; color: #fff; transition: 0.3s; text-transform: uppercase; }
        .project-studio { font-family: 'Space Mono', monospace; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .project-card:hover .project-title { color: var(--neon-green); } 

        .loading-text { grid-column: 1 / -1; text-align: center; color: #444; font-family: 'Space Mono', monospace; margin-top: 50px; }

        .simple-footer { text-align: center; padding: 40px 0; border-top: 1px solid #111; margin-top: 80px; display: flex; flex-direction: column; align-items: center; gap: 20px; color: #444; font-size: 10px; font-family: 'Space Mono', monospace; }

        @media (max-width: 1024px) {
            .gallery-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .navbar { padding: 20px; } .nav-links, .back-btn { display: none; } .hamburger { display: flex; }
            .studio-container { padding: 110px 4% 60px 4%; }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; } 
            .page-title { font-size: 32px; }
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>

    <nav class="navbar">
        <div class="brand-logo">MILLIONN<span>.</span></div>
        <div class="nav-links">
            <a href="about" class="nav-link">About</a>
            <a href="contact" class="nav-link">Contact</a>
            <a href="blog" class="nav-link">Blog</a>
        </div>
        <a href="index" class="back-btn">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Ana Sayfa
        </a>
        <div class="hamburger" onclick="toggleMenu()">
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </nav>

    <div class="mobile-menu-overlay" id="mobileMenu">
        <a href="index" class="mobile-link">Home</a>
        <a href="about" class="mobile-link">About</a>
        <a href="contact" class="mobile-link">Contact</a>
        <a href="blog" class="mobile-link">Blog</a>
    </div>

    <div class="studio-container">
        
        <div class="page-header">
            <div class="page-title">STUDIO <span class="highlight">GALLERY.</span></div>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            <div class="loading-text">VERİLER YÜKLENİYOR...</div>
        </div>

    </div>

    <footer class="simple-footer">
        © 2026 Millionn Studio. All Rights Reserved.
    </footer>

    <script type="module">
        import { supabase } from "./configs/supabase.js";

        const grid = document.getElementById('galleryGrid');

        async function fetchGallery() {
            try {
                const { data, error } = await supabase
                    .from('prompts')
                    .select('*')
                    .eq('status', 'active')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    grid.innerHTML = '<div class="loading-text">HENÜZ İÇERİK YOK.</div>';
                    return;
                }

                grid.innerHTML = '';

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    // Clean URL Güncellemesi: view.html yerine view
                    card.onclick = () => window.location.href = `view?id=${item.id}`;

                    card.innerHTML = `
                        <div class="image-box">
                            <img src="${item.image_url}" alt="${item.title}" loading="lazy">
                        </div>
                        <div class="card-meta">
                            <span class="project-title">${item.title}</span>
                            <span class="project-studio">${item.model || 'Nano Banana'}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (err) {
                console.error("Hata:", err);
                grid.innerHTML = '<div class="loading-text" style="color:red">BAĞLANTI HATASI!</div>';
            }
        }

        fetchGallery();

        window.toggleMenu = function() {
            const menu = document.getElementById('mobileMenu');
            const icon = document.querySelector('.hamburger');
            menu.classList.toggle('active');
            icon.classList.toggle('active');
        }
    </script>

</body>
</html>
