<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILLIONN. | Dinamik Vitrin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Dark Mode Luxury Zemin */
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        /* Devasa Logotype */
        .header {
            margin-top: 40px;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -2px; /* Tight Kerning - Blok duruş */
        }
        .dot { color: #ffffff; }

        /* Ürün Konteyneri */
        .product-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
            text-align: center;
            max-width: 500px;
            padding: 40px;
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            background: #0a0a0a;
        }

        /* Jilet Gibi Görsel Çerçevesi */
        .product-image {
            width: 100%;
            height: 300px;
            background-color: #111; 
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-weight: 700;
            overflow: hidden; /* Köşelerden taşmayı engeller */
        }

        .product-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .product-price {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 30px;
            color: #d90429; /* Millionn Kırmızısı */
        }

        /* Baskın ve Okunaklı Satın Al Butonu */
        .buy-btn {
            background-color: #ffffff;
            color: #050505;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            padding: 18px 40px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            letter-spacing: -0.5px;
        }

        .buy-btn:hover {
            background-color: #d90429;
            color: #ffffff;
            transform: scale(1.02);
        }

        .buy-btn:disabled {
            background-color: #333;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }

        #statusText {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="header">MILLIONN<span class="dot">.</span></div>

    <div class="product-container">
        
        <div id="p-image" class="product-image">Görsel Yükleniyor...</div>
        
        <div id="p-title" class="product-title">Ürün Yükleniyor...</div>
        <div id="p-price" class="product-price">-- TL</div>

        <button id="buyButton" class="buy-btn" disabled>Satın Al</button>
        <div id="statusText">Veritabanına bağlanılıyor...</div>
    </div>

    <form id="shopierForm" method="post" action="https://www.shopier.com/ShowProduct/api_pay.php" style="display: none;"></form>

    <script type="module">
        import { supabase } from "./configs/supabase.js";
        
        // Dinamik verileri tutacağımız değişkenler
        let dinamikUrunAdi = "";
        let dinamikFiyat = "";

        // 1. SUPABASE'DEN "PRODUCTS" TABLOSUNU ÇEK
        async function urunuGetir() {
            try {
                // Senin 'products' tablosunu çağırıyoruz
                const { data, error } = await supabase.from('products').select('*').limit(1).single();
                
                if (error) throw error;

                // Verileri HTML'e (Ekrana) basıyoruz
                document.getElementById('p-title').innerText = data.title; 
                document.getElementById('p-price').innerText = data.price + " TL";
                
                // GÖRSELİ EKRANA BASIYORUZ (Jilet gibi oturması için object-fit: cover)
                if (data.image_url) {
                    document.getElementById('p-image').innerHTML = `<img src="${data.image_url}" alt="${data.title}" style="width: 100%; height: 100%; object-fit: cover;">`;
                } else {
                    document.getElementById('p-image').innerText = "Görsel Yok";
                }
                
                // Butonu aktifleştiriyoruz
                document.getElementById('buyButton').disabled = false;
                document.getElementById('statusText').innerText = "Sistem hazır.";

                // Arka kapıya gidecek değişkenleri senin tablona göre dolduruyoruz
                dinamikUrunAdi = data.title;
                dinamikFiyat = data.price;

            } catch (error) {
                console.error("Supabase Hatası:", error);
                document.getElementById('statusText').innerText = "Ürünler çekilemedi!";
                document.getElementById('statusText').style.color = "#d90429";
                document.getElementById('p-image').innerText = "Bağlantı Hatası";
            }
        }

        // Fonksiyonu çalıştırıp veriyi ekrana getir
        urunuGetir();

        // 2. SATIN AL BUTONU VE SHOPIER TETİKLEMESİ
        document.getElementById('buyButton').addEventListener('click', async () => {
            const btn = document.getElementById('buyButton');
            const status = document.getElementById('statusText');
            
            btn.disabled = true;
            btn.innerText = "BAĞLANIYOR...";
            status.innerText = "Ödeme altyapısına bağlanılıyor...";

            const orderData = {
                urunAdi: dinamikUrunAdi,
                fiyat: dinamikFiyat,
                musteriAd: "Emirhan",
                musteriSoyad: "Test",
                musteriEmail: "info@millionnstudio.com",
                musteriTelefon: "05555555555",
                musteriSehir: "İzmir",
                musteriAdres: "Millionn Studio Merkez"
            };

            try {
                const response = await fetch('/.netlify/functions/odeme-baslat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                if (!response.ok) throw new Error("Sunucu yanıt vermedi.");
                
                const shopierPayload = await response.json();
                const shopierForm = document.getElementById('shopierForm');
                shopierForm.innerHTML = ''; 
                
                for (const key in shopierPayload) {
                    if (shopierPayload.hasOwnProperty(key)) {
                        const input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = key;
                        input.value = shopierPayload[key];
                        shopierForm.appendChild(input);
                    }
                }
                
                status.innerText = "Yönlendiriliyorsunuz...";
                shopierForm.submit(); 

            } catch (error) {
                console.error("Ödeme Hatası:", error);
                status.innerText = "Bağlantı hatası!";
                btn.disabled = false;
                btn.innerText = "SATIN AL";
            }
        });
    </script>
</body>
</html>
